name: Auto Sync Fork

on:
  schedule:
    - cron: '0 * * * *'  # Har 1 ghante me chalega
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.email "sohansahu2025@gmail.com"
          git config --global user.name "Sohan Sahu"

      - name: Add upstream (original repo)
        run: |
          git remote add upstream https://github.com/8611Omkar/Trusttalk.git
          git fetch upstream
          git checkout main
          git merge upstream/main --allow-unrelated-histories || true
          git push origin main
